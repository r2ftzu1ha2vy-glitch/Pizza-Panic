<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Pizza Panic</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;800;900&display=swap');
:root{
  --bg:#0f1220;--panel:#151a2e;--text:#e9ecff;--muted:#aab0d6;
  --accent:#ff4d6d;--gold:#ffd166;--ice:#72ddff;--good:#3ddc97;--bad:#ff6b6b;
  --stroke:rgba(255,255,255,.10);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Nunito',sans-serif;background:#0d1020;color:var(--text);display:flex;flex-direction:column;height:100%;height:100dvh;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:rgba(15,18,32,.95);border-bottom:1px solid var(--stroke);flex-shrink:0;gap:8px;flex-wrap:wrap;}
.brand{font-family:'Fredoka One',cursive;font-size:20px;color:var(--gold);letter-spacing:.5px;white-space:nowrap;display:flex;align-items:center;gap:6px;}
.hud{display:flex;gap:10px;flex-wrap:wrap;}
.stat{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.06);border:1px solid var(--stroke);border-radius:20px;padding:4px 10px;font-size:13px;font-weight:800;}
.stat svg{width:15px;height:15px;flex-shrink:0;}
.stat .val{color:var(--gold);}
.controls{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.btn{padding:7px 14px;border-radius:20px;border:1px solid var(--stroke);background:rgba(255,255,255,.08);color:var(--text);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;touch-action:manipulation;transition:background .15s;display:flex;align-items:center;gap:5px;}
.btn:hover{background:rgba(255,255,255,.14);}
.btn.primary{background:rgba(61,220,151,.18);border-color:rgba(61,220,151,.35);color:var(--good);}
.btn.danger{background:rgba(255,77,109,.12);border-color:rgba(255,77,109,.30);color:var(--bad);}
.btn.active-speed{background:rgba(255,209,102,.22);border-color:rgba(255,209,102,.5);color:var(--gold);}
.btn svg{width:14px;height:14px;}
.wrap{display:grid;grid-template-columns:1fr 280px;gap:10px;padding:10px;flex:1;overflow:hidden;min-height:0;}
canvas{width:100%;height:100%;border-radius:14px;border:1px solid var(--stroke);background:#0d1020;box-shadow:0 8px 30px rgba(0,0,0,.4);touch-action:none;display:block;}
.panel{border-radius:14px;padding:10px;border:1px solid var(--stroke);background:rgba(21,26,46,.8);overflow-y:auto;display:flex;flex-direction:column;gap:8px;}
.panel h2{font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin:4px 0 2px;}
.towerBtn{display:flex;align-items:center;gap:8px;width:100%;padding:8px;border-radius:12px;border:1px solid var(--stroke);background:rgba(255,255,255,.05);color:var(--text);cursor:pointer;text-align:left;touch-action:manipulation;transition:background .15s, box-shadow .15s;}
.towerBtn:hover{background:rgba(255,255,255,.09);}
.towerBtn.active{border-color:rgba(255,209,102,.55);box-shadow:0 0 0 3px rgba(255,209,102,.15) inset;background:rgba(255,209,102,.08);}
.towerBtn .ico{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;background:rgba(255,209,102,.12);border:1px solid rgba(255,209,102,.2);flex-shrink:0;}
.towerBtn .ico svg{width:20px;height:20px;}
.towerBtn .meta{flex:1;min-width:0;}
.towerBtn .name{font-weight:900;font-size:13px;}
.towerBtn .desc{color:var(--muted);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.towerBtn .price{color:var(--gold);font-weight:900;font-size:13px;flex-shrink:0;}
.waveInfo{background:rgba(255,77,109,.08);border:1px solid rgba(255,77,109,.2);border-radius:10px;padding:8px 10px;font-size:12px;color:var(--muted);}
.waveInfo b{color:var(--text);}
.helpList{font-size:11px;color:var(--muted);line-height:1.6;list-style:none;}
.helpList li::before{content:"→ ";color:var(--gold);}
#actionBar{position:fixed;left:0;right:0;bottom:0;padding:10px 12px max(10px,env(safe-area-inset-bottom,0px));display:none;z-index:9999;background:linear-gradient(0deg,rgba(10,12,24,.95),rgba(10,12,24,.7));backdrop-filter:blur(10px);}
#actionBar .abCard{max-width:600px;margin:0 auto;border:1px solid rgba(255,255,255,.12);border-radius:16px;background:rgba(15,18,32,.9);padding:12px;}
#actionBar .abTitle{font:900 15px 'Nunito',sans-serif;color:var(--gold);margin:0 2px 8px;}
#actionBar .abRow{display:flex;gap:8px;}
#actionBar button{flex:1;padding:12px 8px;border-radius:12px;border:1px solid var(--stroke);background:rgba(255,255,255,.08);color:var(--text);font:800 14px 'Nunito',sans-serif;cursor:pointer;touch-action:manipulation;}
#actionBar button.danger{border-color:rgba(255,107,107,.35);color:var(--bad);}
#actionBar .abHint{margin:8px 2px 0;color:var(--muted);font-size:11px;}
@media(max-width:680px){
  .wrap{grid-template-columns:1fr;grid-template-rows:1fr auto;padding:6px;gap:6px;}
  .panel{flex-direction:row;overflow-x:auto;overflow-y:hidden;padding:8px;gap:6px;border-radius:12px;align-items:center;}
  .panel h2{display:none;}
  .towerBtn{min-width:90px;flex-direction:column;align-items:center;text-align:center;padding:6px;gap:4px;}
  .towerBtn .meta{min-width:0;width:100%;}
  .towerBtn .desc{display:none;}
  .waveInfo,.helpList,.panel>p{display:none;}
  .topbar{padding:6px 10px;}
  .brand{font-size:16px;}
  .stat{padding:3px 8px;font-size:12px;}
  .btn{padding:6px 10px;font-size:12px;}
}
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="10" fill="#c0392b"/>
      <circle cx="12" cy="12" r="8" fill="#e74c3c"/>

      <circle cx="15" cy="10" r="1.8" fill="#c0392b"/>
      <circle cx="11" cy="14" r="1.8" fill="#c0392b"/>
      <path d="M12 4 L20 20 L4 20 Z" fill="rgba(255,220,100,.12)" stroke="rgba(255,220,100,.35)" stroke-width="0.5"/>
    </svg>
    Pizza Panic
  </div>
  <div class="hud">
    <div class="stat">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16zm-1-11h2v5h-2zm0 6h2v2h-2z" fill="#72ddff"/></svg>
      <span>Wave <span class="val" id="wave">1</span></span>
    </div>
    <div class="stat">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="#ff4d6d"/></svg>
      <span class="val" id="lives">20</span>
    </div>
    <div class="stat">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#ffd166" stroke-width="1.5"/><text x="12" y="16" text-anchor="middle" font-size="11" fill="#ffd166" font-weight="bold">$</text></svg>
      <span class="val" id="cash">150</span>
    </div>
    <div class="stat">
      <svg viewBox="0 0 24 24" fill="none"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill="#ffd166"/></svg>
      <span class="val" id="score">0</span>
    </div>
  </div>
  <div class="controls">
    <button class="btn" id="btnSpeed1" onclick="setSpeed(1)">
      <svg viewBox="0 0 24 24" fill="none"><polygon points="5,3 19,12 5,21" fill="currentColor"/></svg>1x
    </button>
    <button class="btn" id="btnSpeed2" onclick="setSpeed(2)">
      <svg viewBox="0 0 24 24" fill="none"><polygon points="3,3 12,12 3,21" fill="currentColor"/><polygon points="12,3 21,12 12,21" fill="currentColor"/></svg>2x
    </button>
    <button class="btn" id="btnSpeed5" onclick="setSpeed(5)">
      <svg viewBox="0 0 24 24" fill="none"><polygon points="2,3 9,12 2,21" fill="currentColor"/><polygon points="8,3 15,12 8,21" fill="currentColor"/><polygon points="14,3 22,12 14,21" fill="currentColor"/></svg>5x
    </button>
    <button class="btn primary" id="btnStart">
      <svg viewBox="0 0 24 24" fill="none" width="14" height="14"><polygon points="5,3 19,12 5,21" fill="currentColor"/></svg>Start
    </button>
    <button class="btn" id="btnPause">
      <svg viewBox="0 0 24 24" fill="none" width="14" height="14"><rect x="6" y="4" width="4" height="16" fill="currentColor"/><rect x="14" y="4" width="4" height="16" fill="currentColor"/></svg>Pause
    </button>
    <button class="btn danger" id="btnRestart">
      <svg viewBox="0 0 24 24" fill="none" width="14" height="14"><path d="M17.65 6.35A7.96 7.96 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" fill="currentColor"/></svg>
    </button>
    <button class="btn" id="btnMusic" onclick="toggleMusic()">
      <svg viewBox="0 0 24 24" fill="none" width="14" height="14" id="musicIcon"><path d="M9 18V5l12-2v13" stroke="currentColor" stroke-width="2"/><circle cx="6" cy="18" r="3" fill="currentColor"/><circle cx="18" cy="16" r="3" fill="currentColor"/></svg>
    </button>
  </div>
</header>

<main class="wrap">
  <canvas id="game" width="980" height="560"></canvas>
  <aside class="panel">
    <h2>Tower Shop</h2>

    <button class="towerBtn" data-tower="pep">
      <span class="ico">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" fill="#c0392b"/><circle cx="8" cy="9" r="2" fill="#922b21"/><circle cx="15" cy="10" r="2" fill="#922b21"/><circle cx="11" cy="15" r="2" fill="#922b21"/></svg>
      </span>
      <span class="meta"><span class="name">Pepperoni</span><span class="desc">Fast single-target</span></span>
      <span class="price">$50</span>
    </button>

    <button class="towerBtn" data-tower="freezer">
      <span class="ico">
        <svg viewBox="0 0 24 24" fill="none"><rect x="10" y="2" width="4" height="20" rx="2" fill="#72ddff"/><rect x="2" y="10" width="20" height="4" rx="2" fill="#72ddff"/><line x1="5" y1="5" x2="19" y2="19" stroke="#72ddff" stroke-width="2.5" stroke-linecap="round"/><line x1="19" y1="5" x2="5" y2="19" stroke="#72ddff" stroke-width="2.5" stroke-linecap="round"/></svg>
      </span>

    <button class="towerBtn" data-tower="laser">
      <span class="ico">
        <svg viewBox="0 0 24 24" fill="none"><rect x="11" y="2" width="2" height="14" rx="1" fill="#ffd166"/><polygon points="8,16 16,16 12,22" fill="#ffd166"/><circle cx="12" cy="10" r="3" fill="#fff3b0"/></svg>
      </span>
      <span class="meta"><span class="name">Laser Slice</span><span class="desc">High damage beam</span></span>
      <span class="price">$95</span>
    </button>

    <button class="towerBtn" data-tower="bomb">
      <span class="ico">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="14" r="8" fill="#ff9f1c"/><path d="M14 6 C16 2 20 2 20 2" stroke="#ffd166" stroke-width="2" stroke-linecap="round"/><circle cx="21" cy="3" r="2" fill="#ff4d6d"/></svg>
      </span>
      <span class="meta"><span class="name">Bomb Oven</span><span class="desc">Big AOE explosion</span></span>
      <span class="price">$110</span>
    </button>

    <button class="towerBtn" data-tower="garlic">
      <span class="ico">
        <svg viewBox="0 0 24 24" fill="none"><ellipse cx="12" cy="14" rx="6" ry="7" fill="#c8ff78"/><ellipse cx="9" cy="11" rx="3.5" ry="5" fill="#a8e55a"/><ellipse cx="15" cy="11" rx="3.5" ry="5" fill="#a8e55a"/><path d="M12 7 C12 4 14 2 14 2" stroke="#8dc43a" stroke-width="1.5" stroke-linecap="round"/></svg>
      </span>
      <span class="meta"><span class="name">Garlic Cannon</span><span class="desc">Rapid multi-shot</span></span>
      <span class="price">$130</span>
    </button>

    <button class="towerBtn" data-tower="chili">
      <span class="ico">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 20 C8 20 5 16 6 11 C7 7 10 5 12 5 C14 5 17 7 18 11 C19 16 16 20 12 20Z" fill="#ff5028"/><path d="M12 5 C12 3 14 2 15 2" stroke="#3ddc97" stroke-width="2" stroke-linecap="round"/><ellipse cx="10" cy="13" rx="1.5" ry="2.5" fill="#ff7050" opacity="0.6"/></svg>
      </span>
      <span class="meta"><span class="name">Chili Zapper</span><span class="desc">Chain lightning</span></span>
      <span class="price">$160</span>
    </button>

    <button class="towerBtn" data-tower="mushroom_t">
      <span class="ico">
        <svg viewBox="0 0 24 24" fill="none"><ellipse cx="12" cy="11" rx="9" ry="7" fill="#8b5e3c"/><ellipse cx="12" cy="11" rx="7" ry="5" fill="#a0522d"/><circle cx="9" cy="10" r="1.5" fill="#f5deb3"/><circle cx="14" cy="9" r="1.5" fill="#f5deb3"/><rect x="10" y="16" width="4" height="5" rx="2" fill="#c8a87a"/></svg>
      </span>
      <span class="meta"><span class="name">Shroom Spore</span><span class="desc">Poison DOT area</span></span>
      <span class="price">$140</span>

    <button class="towerBtn" data-tower="cannon">
      <span class="ico">
        <svg viewBox="0 0 24 24" fill="none"><rect x="2" y="10" width="16" height="7" rx="3" fill="#888"/><rect x="16" y="12" width="6" height="3" rx="1.5" fill="#aaa"/><circle cx="7" cy="18" r="2.5" fill="#555"/><circle cx="13" cy="18" r="2.5" fill="#555"/></svg>
      </span>
      <span class="meta"><span class="name">Heavy Cannon</span><span class="desc">Armor-piercing</span></span>
      <span class="price">$200</span>
    </button>

    <button class="towerBtn" data-tower="tesla">
      <span class="ico">
        <svg viewBox="0 0 24 24" fill="none"><polygon points="12,2 14,10 20,10 15,15 17,22 12,18 7,22 9,15 4,10 10,10" fill="#72ddff"/></svg>
      </span>
      <span class="meta"><span class="name">Tesla Coil</span><span class="desc">AoE lightning</span></span>
      <span class="price">$220</span>
    </button>

    <h2>Controls</h2>
    <ul class="helpList">
      <li>Select tower then tap map</li>
      <li>Tap placed tower to upgrade/sell</li>
      <li>Tap button again to deselect</li>
      <li>Esc / Del to deselect / sell</li>
      <li>Use 1x / 2x / 5x for speed</li>
    </ul>

    <div class="waveInfo" id="waveInfo">
      <b>Wave 1</b> — Rats incoming!<br>Boss every 5th wave
    </div>
  </aside>
</main>

<div id="actionBar">
  <div class="abCard">
    <div class="abTitle" id="abTitle">Tower</div>
    <div class="abRow">
      <button id="abUpgrade">Upgrade</button>
      <button id="abSell" class="danger">Sell</button>
      <button id="abClose">Close</button>
    </div>
    <div class="abHint" id="abHint"></div>
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const W = canvas.width, H = canvas.height;

const UI = {
  wave: document.getElementById("wave"),
  lives: document.getElementById("lives"),
  cash: document.getElementById("cash"),
  score: document.getElementById("score"),
  btnStart: document.getElementById("btnStart"),
  btnPause: document.getElementById("btnPause"),
  btnRestart: document.getElementById("btnRestart"),
  waveInfo: document.getElementById("waveInfo"),
};
const actionBar = document.getElementById("actionBar");
const abTitle = document.getElementById("abTitle");
const abHint = document.getElementById("abHint");
const abUpgrade = document.getElementById("abUpgrade");
const abSell = document.getElementById("abSell");
const abClose = document.getElementById("abClose");

// Speed system
let gameSpeed = 1;
function setSpeed(s) {
  gameSpeed = s;
  document.getElementById("btnSpeed1").classList.toggle("active-speed", s===1);
  document.getElementById("btnSpeed2").classList.toggle("active-speed", s===2);
  document.getElementById("btnSpeed5").classList.toggle("active-speed", s===5);
}
setSpeed(1);

// Audio
let audioCtx = null;
let musicMuted = false;
let musicInterval = null;
let musicStep = 0;

function ensureAudio(){
  if(!audioCtx) audioCtx = new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==="suspended") audioCtx.resume();
}
function beepRaw({freq=440,type="sine",dur=0.08,gain=0.07,slide=0,when=0}){
  if(!audioCtx) return;
  const t0=audioCtx.currentTime+when;
  const osc=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  osc.type=type; osc.frequency.setValueAtTime(freq,t0);
  if(slide) osc.frequency.linearRampToValueAtTime(freq+slide,t0+dur);
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.exponentialRampToValueAtTime(gain,t0+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  osc.connect(g).connect(audioCtx.destination);
  osc.start(t0); osc.stop(t0+dur+0.02);
}
function noiseBurst({dur=0.12,gain=0.06,when=0,hp=900}){
  if(!audioCtx) return;
  const t0=audioCtx.currentTime+when;
  const bufSize=Math.max(1,Math.floor(audioCtx.sampleRate*dur));
  const buf=audioCtx.createBuffer(1,bufSize,audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<bufSize;i++) d[i]=(Math.random()*2-1)*(1-i/bufSize);
  const src=audioCtx.createBufferSource(); src.buffer=buf;
  const f=audioCtx.createBiquadFilter(); f.type="highpass"; f.frequency.value=hp;
  const g=audioCtx.createGain();
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.exponentialRampToValueAtTime(gain,t0+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  src.connect(f).connect(g).connect(audioCtx.destination);
  src.start(t0); src.stop(t0+dur+0.02);
}
const SFX = {
  shoot(){ ensureAudio(); beepRaw({freq:640,type:"square",dur:0.05,gain:0.04,slide:-160}); },
  laser(){ ensureAudio(); beepRaw({freq:980,type:"sine",dur:0.07,gain:0.05,slide:120}); },
  freeze(){ ensureAudio(); beepRaw({freq:420,type:"triangle",dur:0.08,gain:0.05,slide:-120}); },
  boom(){ ensureAudio(); noiseBurst({dur:0.18,gain:0.08,hp:200}); beepRaw({freq:110,type:"sawtooth",dur:0.14,gain:0.04,slide:-20}); },
  chain(){ ensureAudio(); beepRaw({freq:760,type:"sine",dur:0.04,gain:0.04,slide:200}); },
  garlic(){ ensureAudio(); beepRaw({freq:520,type:"square",dur:0.04,gain:0.04,slide:-80}); },
  hit(){ ensureAudio(); beepRaw({freq:260,type:"triangle",dur:0.05,gain:0.03,slide:-30}); },
  kill(){ ensureAudio(); beepRaw({freq:520,type:"sine",dur:0.06,gain:0.05}); beepRaw({freq:760,type:"sine",dur:0.06,gain:0.04,when:0.06}); },
  bossKill(){ ensureAudio(); for(let i=0;i<5;i++) beepRaw({freq:300+i*120,type:"triangle",dur:0.1,gain:0.06,when:i*0.09}); },
  place(){ ensureAudio(); beepRaw({freq:330,type:"sine",dur:0.08,gain:0.05,slide:80}); },
  upgrade(){ ensureAudio(); beepRaw({freq:500,type:"triangle",dur:0.06,gain:0.05}); beepRaw({freq:700,type:"triangle",dur:0.08,gain:0.05,when:0.06}); },
  sell(){ ensureAudio(); beepRaw({freq:260,type:"square",dur:0.06,gain:0.04,slide:-80}); },
  leak(){ ensureAudio(); beepRaw({freq:220,type:"sawtooth",dur:0.12,gain:0.05,slide:-80}); },
  wave(){ ensureAudio(); [400,520,660].forEach((f,i)=>beepRaw({freq:f,type:"triangle",dur:0.08,gain:0.05,when:i*0.09})); },
  bossAlert(){ ensureAudio(); [200,160,120].forEach((f,i)=>beepRaw({freq:f,type:"sawtooth",dur:0.16,gain:0.08,when:i*0.16})); },
  poison(){ ensureAudio(); beepRaw({freq:180,type:"sine",dur:0.06,gain:0.03,slide:40}); },
  tesla(){ ensureAudio(); beepRaw({freq:880,type:"sawtooth",dur:0.04,gain:0.04,slide:300}); },
};

function n2f(note){
  const notes=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  const name=note.slice(0,-1), oct=parseInt(note.slice(-1));
  return 440*Math.pow(2,(notes.indexOf(name)-9+(oct-4)*12)/12);
}
function playMusicNote(freq,type,dur,gain,when){
  if(!audioCtx||musicMuted) return;
  const t0=audioCtx.currentTime+when;
  const osc=audioCtx.createOscillator(); const g=audioCtx.createGain();
  osc.type=type; osc.frequency.value=freq;
  g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(gain,t0+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t0+dur*0.85);
  osc.connect(g).connect(audioCtx.destination); osc.start(t0); osc.stop(t0+dur);
}
const NORMAL_MELODY=["E5","E5","F5","G5","G5","F5","E5","D5","C5","C5","D5","E5","E5","D5","D5","E5"];
const NORMAL_BASS=["C3","G3","C3","E3","F3","C3","G3","G2","C3","G2","C3","E3","F3","C3","G3","G3"];
const BOSS_MELODY=["A4","A4","A4","F4","A4","G4","F4","E4","D4","D4","A4","A4","G4","F4","E4","D4"];
const BOSS_BASS=["A2","E3","A2","C3","F2","C3","E3","A2","A2","E3","A2","F2","E3","D3","C3","A2"];

function startMusic(type){
  if(!audioCtx) return; stopMusic();
  const bpm=type==="boss"?160:120, step=60000/bpm/2;
  const melody=type==="boss"?BOSS_MELODY:NORMAL_MELODY;
  const bass=type==="boss"?BOSS_BASS:NORMAL_BASS;
  const melGain=type==="boss"?0.04:0.03, dur=step/1000*1.1;
  function tick(){
    if(musicMuted) return;
    const idx=musicStep%melody.length;
    playMusicNote(n2f(melody[idx]),"triangle",dur,melGain,0);
    playMusicNote(n2f(bass[idx]),"sawtooth",dur*1.5,0.025,0);
    if(idx%4===0) noiseBurst({dur:0.06,gain:type==="boss"?0.03:0.02,hp:1400});
    musicStep++;
  }
  tick();
  musicInterval=setInterval(tick,step);
}
function stopMusic(){ if(musicInterval){clearInterval(musicInterval);musicInterval=null;} }
function toggleMusic(){
  musicMuted=!musicMuted;
  const icon=document.getElementById("musicIcon");
  if(musicMuted){
    icon.innerHTML='<line x1="2" y1="2" x2="22" y2="22" stroke="currentColor" stroke-width="2"/><path d="M9 18V5l12-2v13" stroke="currentColor" stroke-width="2"/><circle cx="6" cy="18" r="3" fill="currentColor"/><circle cx="18" cy="16" r="3" fill="currentColor"/>';
  } else {
    icon.innerHTML='<path d="M9 18V5l12-2v13" stroke="currentColor" stroke-width="2"/><circle cx="6" cy="18" r="3" fill="currentColor"/><circle cx="18" cy="16" r="3" fill="currentColor"/>';
    if(state&&state.running&&!state.paused) startMusic(state.bossActive?"boss":"normal");
  }
  if(musicMuted) stopMusic();
}

// Helpers
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const dist2=(ax,ay,bx,by)=>{const dx=ax-bx,dy=ay-by;return dx*dx+dy*dy;};
const lerp=(a,b,t)=>a+(b-a)*t;

// Path
const path=[
  {x:40,y:80},{x:300,y:80},{x:300,y:210},{x:140,y:210},
  {x:140,y:420},{x:520,y:420},{x:520,y:150},{x:820,y:150},
  {x:820,y:480},{x:940,y:480},
];
function cachePath(){
  const lens=[]; let total=0;
  for(let i=0;i<path.length-1;i++){
    const a=path[i],b=path[i+1],l=Math.hypot(b.x-a.x,b.y-a.y);
    lens.push(l); total+=l;
  }
  return{lens,total};
}
const pathCache=cachePath();
function pointOnPath(t){
  let d=t*pathCache.total;
  for(let i=0;i<pathCache.lens.length;i++){
    const seg=pathCache.lens[i],a=path[i],b=path[i+1];
    if(d<=seg){const tt=seg===0?0:d/seg;return{x:lerp(a.x,b.x,tt),y:lerp(a.y,b.y,tt)};}
    d-=seg;
  }
  const last=path[path.length-1];return{x:last.x,y:last.y};
}
function isNearRoad(x,y,thresh){
  for(let i=0;i<path.length-1;i++){
    const a=path[i],b=path[i+1],vx=b.x-a.x,vy=b.y-a.y;
    const wx=x-a.x,wy=y-a.y;
    const c1=vx*wx+vy*wy,c2=vx*vx+vy*vy;
    let t=c2===0?0:c1/c2; t=clamp(t,0,1);
    const px=a.x+vx*t,py=a.y+vy*t;
    if(Math.hypot(x-px,y-py)<=thresh) return true;
  }
  return false;
}

// State
let state;
let selectedTowerId=null;
let selectedTowerIndex=-1;
let mouse={x:0,y:0};
// Background tab support using Page Visibility API + timestamp-based dt

let visibilityPaused=false;

function updateHUD(){

function updateWaveInfo(){

// Selection
function setSelectedTower(id){
  selectedTowerId=id;
  document.querySelectorAll(".towerBtn").forEach(btn=>{
    btn.classList.toggle("active",id&&btn.dataset.tower===id);
  });
}
function toggleSelectedTower(id){
  if(selectedTowerId===id) setSelectedTower(null); else setSelectedTower(id);
}
function closeTowerActions(){ selectedTowerIndex=-1; actionBar.style.display="none"; }
function openTowerActions(index){
  selectedTowerIndex=index;

  const def=TOWERS[t.type];
  const up=towerUpgradeCost(t);
  abTitle.textContent=`${def.name} Lv${t.level}`;

document.querySelectorAll(".towerBtn").forEach(btn=>{

});
window.addEventListener("keydown",e=>{

  if(e.key==="Delete"||e.key==="Backspace"){
    if(selectedTowerIndex!==-1){ ensureAudio(); sellTower(selectedTowerIndex); closeTowerActions(); }
  }
});
abUpgrade.addEventListener("click",()=>{ ensureAudio(); if(selectedTowerIndex>=0){upgradeTower(state.towers[selectedTowerIndex]); openTowerActions(selectedTowerIndex);} });
abSell.addEventListener("click",()=>{ ensureAudio(); if(selectedTowerIndex>=0){sellTower(selectedTowerIndex); closeTowerActions();} });
abClose.addEventListener("click",()=>closeTowerActions());

// Tower logic
function placeTower(x,y){
  if(!selectedTowerId) return false;
  const def=TOWERS[selectedTowerId];
  if(state.cash<def.cost) return false;
  if(isNearRoad(x,y,36)) return false;
  for(const t of state.towers) if(dist2(x,y,t.x,t.y)<26*26) return false;
  state.cash-=def.cost;
  state.towers.push({type:selectedTowerId,x,y,range:def.range,fireRate:def.fireRate,cd:0,level:0,cost:def.cost});
  SFX.place(); updateHUD(); return true;
}
function towerUpgradeCost(t){ return Math.round(t.cost*(0.7+t.level*0.55)); }
function upgradeTower(t){
  const c=towerUpgradeCost(t);
  if(state.cash<c) return false;
  state.cash-=c; t.level++; t.range*=1.06; t.fireRate*=1.06;
  SFX.upgrade(); updateHUD(); return true;
}
function sellTower(idx){
  const t=state.towers[idx];
  const refund=Math.round(t.cost*0.65+t.level*0.35*t.cost);
  state.cash+=refund; state.towers.splice(idx,1);
  if(selectedTowerIndex===idx) selectedTowerIndex=-1;
  else if(selectedTowerIndex>idx) selectedTowerIndex--;
  SFX.sell(); updateHUD();
}
function findTowerAt(x,y){
  let best=-1,bd=Infinity;
  for(let i=0;i<state.towers.length;i++){
    const t=state.towers[i],d=dist2(x,y,t.x,t.y);
    if(d<22*22&&d<bd){bd=d;best=i;}
  }
  return best;
}

// Input
canvas.addEventListener("pointermove",ev=>{
  const r=canvas.getBoundingClientRect();
  mouse.x=(ev.clientX-r.left)*(W/r.width);
  mouse.y=(ev.clientY-r.top)*(H/r.height);
});
canvas.addEventListener("pointerdown",ev=>{
  ensureAudio();
  if(!state.running||state.paused) return;
  const r=canvas.getBoundingClientRect();
  const x=(ev.clientX-r.left)*(W/r.width);
  const y=(ev.clientY-r.top)*(H/r.height);
  const hit=findTowerAt(x,y);
  if(hit!==-1){ openTowerActions(hit); return; }
  closeTowerActions();
  placeTower(x,y);
});

// Visibility API – keep game ticking in background via RAF
document.addEventListener("visibilitychange",()=>{

// Waves
function startWave(){
  state.betweenWaves=false;
  state.spawn.active=true;
  const w=state.wave;
  state.spawn.enemyHP=18+Math.floor(w*5.5);
  state.spawn.enemySpeed=44+w*2.4;
  state.spawn.baseBounty=7+Math.floor(w*0.9);
  const isUltra=w%15===0;
  const isBoss=w%5===0;
  let count=8+w*3;
  if(isBoss) count=Math.max(8,count-4);
  state.spawn.toSpawn=count+(isBoss?1:0)+(isUltra?1:0);
  state.spawn.cooldown=0.22;
  state.bossActive=isBoss||isUltra;
  if(isBoss) SFX.bossAlert(); else SFX.wave();
  if(!musicMuted) startMusic(state.bossActive?"boss":"normal");
  updateWaveInfo();
}

function pickEnemy(){
  const w=state.wave;
  const pool=[];
  pool.push({k:"rat",w:10});
  if(w>=2) pool.push({k:"pineapple",w:Math.min(3+w,12)});
  if(w>=2) pool.push({k:"olive",w:Math.min(2+w,10)});
  if(w>=3) pool.push({k:"anchovy",w:Math.min(1+w*0.8,9)});
  if(w>=3) pool.push({k:"sausage",w:Math.min(w*0.7,9)});
  if(w>=4) pool.push({k:"mushroom",w:Math.min(w*0.6,8)});
  if(w>=4) pool.push({k:"onion",w:Math.min(w*0.5,8)});
  if(w>=5) pool.push({k:"brocolli",w:Math.min(w*0.5,7)});
  if(w>=6) pool.push({k:"pepper",w:Math.min(w*0.4,7)});
  if(w>=7) pool.push({k:"eggplant",w:Math.min(w*0.35,7)});
  if(w>=8) pool.push({k:"tomato",w:Math.min(w*0.3,6)});
  const total=pool.reduce((s,e)=>s+e.w,0);
  let r=Math.random()*total;
  for(const e of pool){ r-=e.w; if(r<=0) return e.k; }
  return "rat";
}

function spawnEnemy(kind){
  const p=pointOnPath(0);
  const def=ENEMIES[kind];
  const hp=Math.round(state.spawn.enemyHP*def.hp);
  state.enemies.push({
    kind,t:0,x:p.x,y:p.y,r:def.r,
    hp,hpMax:hp,
    speed:state.spawn.enemySpeed*def.spd,
    slowMul:1,slowTimer:0,
    splitDone:false,
    poisonTimer:0,poisonDmg:0,
    armor:def.armor||0,
    regen:def.regen||0,
  });
}

function finishWave(){
  state.betweenWaves=true;
  state.spawn.active=false;
  state.bossActive=false;
  state.nextWaveAt=state.time+2.5;
  state.wave++; updateHUD(); updateWaveInfo();
  const bonus=10+state.wave*2;
  state.cash+=bonus; updateHUD();
  stopMusic();
}

// Projectiles
function fireProjectile(tower,target){
  const def=TOWERS[tower.type];
  const ang=Math.atan2(target.y-tower.y,target.x-tower.x);
  let spd=420,life=0.75;
  if(def.projectile==="laser"){spd=900;life=0.22;}
  if(def.projectile==="bomb"){spd=360;life=0.85;}
  if(def.projectile==="ice"){spd=380;life=0.80;}
  if(def.projectile==="garlic"){spd=500;life=0.50;}
  if(def.projectile==="chain"){spd=700;life=0.30;}
  if(def.projectile==="spore"){spd=280;life=1.0;}
  if(def.projectile==="cannonball"){spd=600;life=0.70;}
  if(def.projectile==="electric"){spd=800;life=0.25;}

  state.bullets.push({
    type:def.projectile,
    x:tower.x,y:tower.y,
    vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
    r:def.projectile==="bomb"||def.projectile==="cannonball"?7:4,
    dmg:def.dmg*(1+tower.level*0.18),
    splash:def.splash?(def.splash*(1+tower.level*0.10)):0,
    slow:def.slow??0,slowDur:def.slowDur??0,
    chainCount:def.chainCount??0,chainRange:def.chainRange??0,
    chainHit:new Set([target]),
    armorPierce:def.armorPierce??0,
    poisonDmg:def.poisonDmg??0,poisonDur:def.poisonDur??0,
    life,
    targetEnemy:target,
  });

  if(def.projectile==="laser") SFX.laser();
  else if(def.projectile==="bomb") SFX.boom();
  else if(def.projectile==="ice") SFX.freeze();
  else if(def.projectile==="garlic") SFX.garlic();
  else if(def.projectile==="chain") SFX.chain();
  else if(def.projectile==="spore") SFX.poison();
  else if(def.projectile==="electric") SFX.tesla();
  else SFX.shoot();
}

function chainLightning(source,dmg,count,range,hitSet){
  if(count<=0) return;
  let next=null,bestD=range*range;
  for(const e of state.enemies){
    if(hitSet.has(e)) continue;
    const d=dist2(source.x,source.y,e.x,e.y);
    if(d<bestD){bestD=d;next=e;}
  }
  if(!next) return;
  hitSet.add(next);
  addParticles(source.x,source.y,"rgba(255,180,60,.9)",4);
  addLine(source.x,source.y,next.x,next.y,"rgba(255,180,60,.85)");
  applyHit(next,dmg*0.75,{slow:0,slowDur:0,armorPierce:0,poisonDmg:0,poisonDur:0},true);
  chainLightning(next,dmg*0.75,count-1,range,hitSet);
}

// Particles
function addParticles(x,y,color,n=8){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=40+Math.random()*160;
    state.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.35+Math.random()*0.25,r:2+Math.random()*2,color});
  }
}
function addLine(x1,y1,x2,y2,color){
  state.particles.push({isLine:true,x1,y1,x2,y2,life:0.15,maxLife:0.15,color});
}

// Main loop — uses timestamps so background tabs still advance
let rafId;
function loop(now){
  rafId=requestAnimationFrame(loop);
  const rawDt=clamp((now-lastTimestamp)/1000,0,0.1);
  lastTimestamp=now;
  // Apply speed multiplier but cap per-tick to avoid huge jumps
  const dt=clamp(rawDt*gameSpeed,0,0.12);
  if(state.running&&!state.paused&&!visibilityPaused) update(dt);
  // Always render so canvas stays fresh
  render();
}
requestAnimationFrame(loop);

function update(dt){
  state.time+=dt;
  if(state.betweenWaves&&state.time>=state.nextWaveAt) startWave();

  // spawn
  if(state.spawn.active){
    state.spawn.cooldown-=dt;
    while(state.spawn.cooldown<=0&&state.spawn.toSpawn>0){
      const w=state.wave;
      const isUltra=w%15===0, isBoss=w%5===0;
      const remaining=state.spawn.toSpawn;
      if(isUltra&&remaining===1) spawnEnemy("ultraBoss");
      else if(isBoss&&remaining===1) spawnEnemy("megaboss");
      else spawnEnemy(pickEnemy());
      state.spawn.toSpawn--;
      state.spawn.cooldown+=0.50;
    }
    if(state.spawn.toSpawn<=0&&state.enemies.length===0) finishWave();
  }

  // enemies
  for(let i=state.enemies.length-1;i>=0;i--){
    const e=state.enemies[i];
    if(e.slowTimer>0){e.slowTimer-=dt;if(e.slowTimer<=0)e.slowMul=1;}

    // regen
    if(e.regen>0&&e.hp<e.hpMax){ e.hp=Math.min(e.hpMax,e.hp+e.regen*dt); }

    // poison DOT
    if(e.poisonTimer>0){
      e.poisonTimer-=dt;
      e.hp-=e.poisonDmg*dt;
      if(e.hp<=0){
        killEnemy(e,i); continue;
      }
    }

    e.t+=(e.speed*e.slowMul*dt)/pathCache.total;
    const p=pointOnPath(clamp(e.t,0,1));
    e.x=p.x; e.y=p.y;

    // brocolli / eggplant splits
    if((e.kind==="brocolli"||e.kind==="eggplant")&&!e.splitDone&&e.hp<e.hpMax*0.5){
      e.splitDone=true;
      const childKind=e.kind==="eggplant"?"olive":"olive";
      for(let s=0;s<2;s++){
        const hp=Math.round(e.hpMax*0.3);
        state.enemies.push({kind:childKind,t:e.t,x:e.x,y:e.y,r:11,hp,hpMax:hp,speed:e.speed*1.15,slowMul:1,slowTimer:0,splitDone:false,poisonTimer:0,poisonDmg:0,armor:0,regen:0});
      }
      addParticles(e.x,e.y,e.kind==="eggplant"?"rgba(120,40,180,.9)":"rgba(60,200,80,.9)",10);
    }

    if(e.t>=1){
      state.enemies.splice(i,1);
      const dmg=e.kind==="ultraBoss"?8:(e.kind==="megaboss"?5:(e.kind==="meatball"||e.kind==="tomato"?3:1));
      state.lives-=dmg; SFX.leak(); updateHUD();
      if(state.lives<=0){state.running=false;state.paused=false;closeTowerActions();stopMusic();}
    }
  }

  // towers shoot
  for(const t of state.towers){
    t.cd-=dt;
    if(t.cd>0) continue;
    const r2=t.range*t.range;
    let best=null,bestScore=Infinity;
    for(const e of state.enemies){
      const d=dist2(t.x,t.y,e.x,e.y);
      if(d>r2) continue;
      const bossPrio=(e.kind==="ultraBoss")?-3e12:(e.kind==="megaboss")?-2e12:(e.kind==="meatball")?-1e12:0;
      const score=bossPrio+(1-e.t)*1e9;
      if(score<bestScore){bestScore=score;best=e;}
    }
    if(best){
      fireProjectile(t,best);
      t.cd=1/(t.fireRate*(1+t.level*0.06));
    }
  }

  // bullets
  for(let i=state.bullets.length-1;i>=0;i--){
    const b=state.bullets[i];
    b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt;
    let hit=-1;
    for(let j=0;j<state.enemies.length;j++){
      const e=state.enemies[j];
      const rr=b.r+e.r;
      if(dist2(b.x,b.y,e.x,e.y)<=rr*rr){hit=j;break;}
    }
    if(hit!==-1){
      const e=state.enemies[hit];
      applyHit(e,b.dmg,b,false);
      if(b.splash>0){
        const s2=b.splash*b.splash;
        for(let j=state.enemies.length-1;j>=0;j--){
          if(j===hit) continue;
          if(dist2(b.x,b.y,state.enemies[j].x,state.enemies[j].y)<=s2)
            applyHit(state.enemies[j],b.dmg*0.65,b,true);
        }
        const splashColor=b.type==="spore"?"rgba(120,200,80,.9)":(b.type==="electric"?"rgba(114,221,255,.9)":"rgba(255,209,102,.9)");
        addParticles(b.x,b.y,splashColor,14);
      } else {
        addParticles(b.x,b.y,"rgba(255,77,109,.9)",6);
      }
      if(b.chainCount>0&&b.chainHit){
        chainLightning(e,b.dmg,b.chainCount,b.chainRange,b.chainHit);
      }
      state.bullets.splice(i,1); continue;
    }
    if(b.life<=0||b.x<0||b.y<0||b.x>W||b.y>H) state.bullets.splice(i,1);
  }

  // particles
  for(let i=state.particles.length-1;i>=0;i--){
    const p=state.particles[i];
    if(p.isLine){p.life-=dt;if(p.life<=0)state.particles.splice(i,1);continue;}
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.vx*=Math.pow(0.04,dt); p.vy*=Math.pow(0.04,dt);
    p.life-=dt;
    if(p.life<=0) state.particles.splice(i,1);
  }
}

function applyHit(enemy,dmg,proj,fromSplash){
  const pierce=proj.armorPierce||0;
  const effectiveArmor=Math.max(0,enemy.armor-pierce);
  enemy.hp-=dmg*(1-effectiveArmor);
  if(!fromSplash) SFX.hit();
  if(proj.slowDur>0){
    enemy.slowMul=Math.min(enemy.slowMul,proj.slow);
    enemy.slowTimer=Math.max(enemy.slowTimer,proj.slowDur);
  } else {
    enemy.slowMul=Math.min(enemy.slowMul,0.92);
    enemy.slowTimer=Math.max(enemy.slowTimer,0.08);
  }
  if(proj.poisonDmg>0){
    enemy.poisonTimer=Math.max(enemy.poisonTimer,proj.poisonDur||2);
    enemy.poisonDmg=Math.max(enemy.poisonDmg,proj.poisonDmg);
  }
  if(enemy.hp<=0){
    const idx=state.enemies.indexOf(enemy);
    if(idx!==-1) killEnemy(enemy,idx);
  }
}

function killEnemy(enemy,idx){
  const def=ENEMIES[enemy.kind];
  const bounty=Math.round(state.spawn.baseBounty*def.bounty);
  state.cash+=bounty;
  const pts=enemy.kind==="ultraBoss"?1000:(enemy.kind==="megaboss"?500:(enemy.kind==="meatball"?150:10));
  state.score+=pts;
  if(enemy.kind==="ultraBoss"||enemy.kind==="megaboss") SFX.bossKill(); else SFX.kill();
  addParticles(enemy.x,enemy.y,def.color,enemy.r*1.2|0);
  state.enemies.splice(idx,1);
  updateHUD();
}

// Render
function drawGrid(){
  ctx.save();
  ctx.strokeStyle="rgba(255,255,255,.04)";ctx.lineWidth=1;
  const step=40;
  for(let x=0;x<=W;x+=step){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<=H;y+=step){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.restore();
}

      ctx.beginPath();ctx.arc(x+s,y,s*0.5,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle="#7a3810";ctx.lineWidth=s*0.1;
      for(let i=-1;i<=1;i++){ctx.beginPath();ctx.moveTo(x+i*s*0.5,y-s*0.4);ctx.lineTo(x+i*s*0.5,y+s*0.4);ctx.stroke();}
      break;
    case "tomato":
      ctx.fillStyle="#dc3228";ctx.beginPath();ctx.arc(x,y,s,0,Math.PI*2);ctx.fill();
      ctx.fillStyle="#b01818";ctx.beginPath();ctx.arc(x,y,s*0.65,0,Math.PI*2);ctx.fill();
      ctx.fillStyle="#3dc850";
      [[x-s*0.2,y-s],[x+s*0.1,y-s*0.9]].forEach(([cx,cy])=>{ctx.beginPath();ctx.ellipse(cx,cy,s*0.15,s*0.3,-0.3,0,Math.PI*2);ctx.fill();});
      break;
    case "ultraBoss":
      const now2=performance.now();
      const pulse=0.9+0.1*Math.sin(now2/120);
      ctx.fillStyle="#b400ff";ctx.beginPath();ctx.arc(x,y,s*pulse,0,Math.PI*2);ctx.fill();
      ctx.fillStyle="#8800cc";ctx.beginPath();ctx.arc(x,y,s*0.7*pulse,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle="rgba(200,0,255,.7)";ctx.lineWidth=s*0.2;
      ctx.beginPath();ctx.arc(x,y,s*1.25*pulse,0,Math.PI*2);ctx.stroke();
      ctx.strokeStyle="rgba(255,180,255,.5)";ctx.lineWidth=s*0.1;
      ctx.beginPath();ctx.arc(x,y,s*1.5*pulse,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle="#fff";
      [[x-s*0.35,y-s*0.2],[x+s*0.35,y-s*0.2]].forEach(([cx,cy])=>{ctx.beginPath();ctx.arc(cx,cy,s*0.2,0,Math.PI*2);ctx.fill();});
      ctx.fillStyle="#b400ff";
      [[x-s*0.35,y-s*0.2],[x+s*0.35,y-s*0.2]].forEach(([cx,cy])=>{ctx.beginPath();ctx.arc(cx,cy,s*0.1,0,Math.PI*2);ctx.fill();});
      break;
    default:
      ctx.fillStyle="#888";ctx.beginPath();ctx.arc(x,y,s,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

function drawEnemy(e){
  const def=ENEMIES[e.kind];
  ctx.save();
  ctx.fillStyle="rgba(0,0,0,.2)";
  ctx.beginPath();ctx.ellipse(e.x,e.y+e.r*0.7,e.r*.9,e.r*.4,0,0,Math.PI*2);ctx.fill();
  // poison glow
  if(e.poisonTimer>0){
    ctx.globalAlpha=0.35;ctx.fillStyle="rgba(80,220,80,.8)";
    ctx.beginPath();ctx.arc(e.x,e.y,e.r*1.3,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
  // armor indicator
  if(e.armor>0){
    ctx.globalAlpha=0.3;ctx.strokeStyle="rgba(200,200,50,.9)";ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(e.x,e.y,e.r+3,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;
  }
  drawEnemyIcon(e.kind,e.x,e.y,e.r);
  // hp bar
  const bw=e.r*2.8|0,bh=e.kind==="ultraBoss"||e.kind==="megaboss"?8:5;
  const pct=clamp(e.hp/e.hpMax,0,1);
  ctx.fillStyle="rgba(0,0,0,.4)";ctx.fillRect(e.x-bw/2,e.y-e.r-14,bw,bh);
  ctx.fillStyle=pct>0.5?"rgba(61,220,151,.9)":(pct>0.25?"rgba(255,209,102,.95)":"rgba(255,107,107,.95)");
  ctx.fillRect(e.x-bw/2,e.y-e.r-14,bw*pct,bh);
  // slow ring
  if(e.slowMul<0.999){
    ctx.globalAlpha=0.4;ctx.strokeStyle="rgba(114,221,255,.95)";ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(e.x,e.y,e.r+5,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;
  }
  ctx.restore();
}

function drawBullet(b){
  ctx.save();
  const cols={laser:"rgba(255,209,102,.95)",ice:"rgba(114,221,255,.95)",bomb:"rgba(255,159,28,.95)",garlic:"rgba(180,255,100,.95)",chain:"rgba(255,180,60,.95)",spore:"rgba(80,220,80,.95)",cannonball:"rgba(160,160,160,.95)",electric:"rgba(180,220,255,.95)"};
  ctx.fillStyle=cols[b.type]||"rgba(255,77,109,.95)";
  ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=0.3;
  ctx.beginPath();ctx.arc(b.x,b.y,b.r*2.5,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawParticle(p){
  ctx.save();
  if(p.isLine){
    ctx.globalAlpha=clamp(p.life/p.maxLife,0,1)*0.85;
    ctx.strokeStyle=p.color;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(p.x1,p.y1);ctx.lineTo(p.x2,p.y2);ctx.stroke();
    ctx.restore();return;
  }
  ctx.globalAlpha=clamp(p.life/0.6,0,1);
  ctx.fillStyle=p.color;
  ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawOverlay(){
  ctx.save();
  if(state.running&&!state.paused&&selectedTowerId){
    const def=TOWERS[selectedTowerId];
    const ok=!isNearRoad(mouse.x,mouse.y,36);
    ctx.globalAlpha=0.15;ctx.fillStyle=ok?def.color:"rgba(255,107,107,.9)";
    ctx.beginPath();ctx.arc(mouse.x,mouse.y,def.range,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=ok?0.9:0.5;ctx.fillStyle=ok?def.color:"rgba(255,107,107,.9)";
    ctx.beginPath();ctx.arc(mouse.x,mouse.y,8,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    ctx.font="800 13px Nunito,sans-serif";ctx.textAlign="left";ctx.textBaseline="top";
    ctx.fillStyle="rgba(233,236,255,.85)";
    ctx.fillText(`${def.name} $${def.cost} — tap map to place, tap button again to cancel`,12,12);
  } else if(state.running&&!state.paused&&!selectedTowerId){
    ctx.font="800 13px Nunito,sans-serif";ctx.textAlign="left";ctx.textBaseline="top";
    ctx.fillStyle="rgba(170,176,214,.7)";
    ctx.fillText("Select a tower from the shop",12,12);
  }

  // speed indicator
  if(state.running&&!state.paused&&gameSpeed>1){
    ctx.font="900 14px Nunito,sans-serif";ctx.textAlign="right";ctx.textBaseline="top";
    ctx.fillStyle="rgba(255,209,102,.85)";
    ctx.fillText(`${gameSpeed}x SPEED`,W-12,12);
  }

  // boss banner
  if(state.running&&!state.paused&&state.bossActive&&state.enemies.length>0){
    const bossExists=state.enemies.some(e=>e.kind==="meatball"||e.kind==="megaboss"||e.kind==="ultraBoss");
    if(bossExists){
      const t=performance.now()/500;
      const alpha=0.65+0.25*Math.sin(t*Math.PI*2);
      ctx.globalAlpha=alpha;
      ctx.font="900 22px Fredoka One,cursive";
      ctx.textAlign="center";ctx.textBaseline="top";
      const isUltra=state.enemies.some(e=>e.kind==="ultraBoss");
      ctx.fillStyle=isUltra?"rgba(180,0,255,1)":"rgba(255,100,100,1)";
      ctx.fillText(isUltra?"ULTRA BOSS INCOMING":"BOSS WAVE",W/2,14);
      ctx.globalAlpha=1;
    }
  }

  if(!state.running){
    ctx.fillStyle="rgba(0,0,0,.55)";ctx.fillRect(0,0,W,H);
    const gameOver=state.lives<=0;
    ctx.textAlign="center";
    ctx.font="900 46px Fredoka One,cursive";
    const gr=ctx.createLinearGradient(W/2-200,0,W/2+200,0);
    gr.addColorStop(0,"#ff4d6d");gr.addColorStop(0.5,"#ffd166");gr.addColorStop(1,"#3ddc97");
    ctx.fillStyle=gr;
    ctx.fillText(gameOver?"GAME OVER":"PIZZA PANIC",W/2,H/2-80);
    ctx.font="700 16px Nunito,sans-serif";ctx.fillStyle="rgba(233,236,255,.85)";
    if(gameOver){
      ctx.fillText(`Final Score: ${state.score} pts — Wave ${state.wave}`,W/2,H/2-28);
      ctx.fillText("The enemies stole all the pizza...",W/2,H/2+4);
    } else {
      ctx.fillText("Select a tower from the shop, then tap the map to place it.",W/2,H/2-28);
      ctx.fillText("Tap a placed tower to Upgrade or Sell.",W/2,H/2+4);
    }
    ctx.font="700 14px Nunito,sans-serif";ctx.fillStyle="rgba(255,209,102,.9)";
    ctx.fillText("Boss every 5th wave  |  Ultra Boss every 15th  |  9 tower types  |  11 enemy types",W/2,H/2+38);
    ctx.font="700 13px Nunito,sans-serif";ctx.fillStyle="rgba(170,176,214,.8)";
    ctx.fillText("1x / 2x / 5x speed  |  Runs in background  |  Armor-piercing cannon  |  Poison spores",W/2,H/2+66);
  }

  if(state.paused){
    ctx.fillStyle="rgba(0,0,0,.40)";ctx.fillRect(0,0,W,H);
    ctx.textAlign="center";
    ctx.font="900 42px Fredoka One,cursive";ctx.fillStyle="rgba(255,209,102,.95)";
    ctx.fillText("PAUSED",W/2,H/2-20);
    ctx.font="700 15px Nunito,sans-serif";ctx.fillStyle="rgba(170,176,214,.9)";
    ctx.fillText("Press Pause again to resume",W/2,H/2+18);
  }
  ctx.restore();
}

function render(){
  ctx.clearRect(0,0,W,H);
  drawGrid();drawRoad();
  for(let i=0;i<state.towers.length;i++) drawTower(state.towers[i],i===selectedTowerIndex);
  for(const b of state.bullets) drawBullet(b);
  for(const e of state.enemies) drawEnemy(e);
  for(const p of state.particles) drawParticle(p);
  drawOverlay();
}

// Buttons
UI.btnStart.addEventListener("click",()=>{
  ensureAudio();
  if(!state.running){state.running=true;state.paused=false;}
  else state.paused=false;
  if(!musicMuted) startMusic("normal");
});
UI.btnPause.addEventListener("click",()=>{
  if(!state.running) return;
  state.paused=!state.paused;
  if(state.paused){closeTowerActions();stopMusic();}
  else if(!musicMuted) startMusic(state.bossActive?"boss":"normal");
});
UI.btnRestart.addEventListener("click",()=>reset());
</script>
</body>
</html>
